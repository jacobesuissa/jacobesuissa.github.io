  <main class="page">

    <div class="section-label fade-in">Music</div>

    <h2 class="fade-in">Releases &<br><em>listening</em></h2>

    <hr class="divider fade-in" />

    <!-- SPOTIFY EMBED — replace the src URL with your actual Spotify artist/track embed URL -->
    <div class="fade-in" style="margin-bottom: 3rem;">
      <h3 style="margin-bottom: 1rem;">Stream</h3>
      <!-- To get your Spotify embed: go to your track/album on Spotify → Share → Embed → copy the iframe src -->
      <iframe
        style="border-radius: 0; border: 1px solid var(--border);"
        src="https://open.spotify.com/embed/artist/REPLACE_WITH_YOUR_ARTIST_ID?utm_source=generator&theme=0"
        width="100%"
        height="352"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
        title="Jacobe Suissa on Spotify">
      </iframe>
    </div>

    <!-- BANDCAMP EMBED — replace with your actual Bandcamp embed code -->
    <div class="fade-in" style="margin-bottom: 3rem;">
      <h3 style="margin-bottom: 1rem;">Bandcamp</h3>
      <!-- To get your Bandcamp embed: go to your track/album → Share/Embed → copy the iframe -->
      <iframe
        style="border: 1px solid var(--border);"
        src="https://bandcamp.com/EmbeddedPlayer/REPLACE_WITH_YOUR_BANDCAMP_EMBED/size=large/bgcol=f5f3ef/linkcol=1a1a18/transparent=true/"
        seamless
        width="100%"
        height="120"
        title="Jacobe Suissa on Bandcamp">
      </iframe>
    </div>

    <hr class="divider fade-in" />

    <!-- MUSIC VIDEO — replace with your actual YouTube embed URL -->
    <div class="fade-in" style="margin-bottom: 3rem;">
      <h3 style="margin-bottom: 1rem;">Video</h3>
      <div style="position: relative; width: 100%; aspect-ratio: 16/9;">
        <!-- Replace VIDEO_ID with your actual YouTube video ID -->
        <iframe
          style="border: 1px solid var(--border);"
          width="100%"
          height="100%"
          src="https://www.youtube.com/embed/REPLACE_WITH_VIDEO_ID"
          title="Jacobe Suissa"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <hr class="divider fade-in" />

    <div class="fade-in">
      <h3>Find the music on</h3>
      <div class="music-links">
        <!-- Replace # with your actual profile URLs -->
        <a href="#" class="music-link" target="_blank" rel="noopener">Spotify</a>
        <a href="#" class="music-link" target="_blank" rel="noopener">Bandcamp</a>
        <a href="#" class="music-link" target="_blank" rel="noopener">Apple Music</a>
        <a href="#" class="music-link" target="_blank" rel="noopener">YouTube</a>
        <a href="#" class="music-link" target="_blank" rel="noopener">SoundCloud</a>
      </div>
    </div>

  </main>

</body>
